<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoCall.pro - AI Receptionist for Contractors</title>
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to polyfill fetch in a restricted environment.
      (function() {
        window.global = window;
        const nativeFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: () => nativeFetch,
            set: () => { console.warn('Blocked attempt to overwrite window.fetch'); },
            configurable: true
          });
        } catch (e) {
          // If defineProperty fails, we at least tried.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
