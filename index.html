    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23030303'/><path d='M30 50 L45 65 L70 35' stroke='%2300FF00' stroke-width='12' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>">
    <script>
      // Fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when libraries try to polyfill fetch in a restricted environment.
      (function() {
        window.global = window;
        const nativeFetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            get: () => nativeFetch,
            set: () => { console.warn('Blocked attempt to overwrite window.fetch'); },
            configurable: true
          });
        } catch (e) {
          // If defineProperty fails, we at least tried.
        }
      })();
    </script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
